name = "{{REPO_NAME}}"
type = "webpack"
account_id = ""
workers_dev = true
compatibility_date = "2024-01-01"

[site]
bucket = "./dist"

[build]
command = "npm run build"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[headers]
  [headers."/*"]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
